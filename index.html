<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>מעקב פיננסי</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="פיננסים"/>
  <link rel="apple-touch-icon" href="https://perezari.github.io/Finance/icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ===== LOADER ===== -->
  <div id="loader" class="loader-overlay">
    <div class="loader-ring"></div>
    <p id="loader-text">טוען...</p>
  </div>

  <!-- ===== AUTH SCREEN ===== -->
  <div id="auth-screen" class="screen" style="display:none;">
    <div class="auth-container">
      <div class="auth-brand">
        <div class="auth-logo">₪</div>
        <h1 class="auth-title">מעקב פיננסי</h1>
        <p class="auth-subtitle">הבן איפה אתה עומד כלכלית</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchAuthTab('login')">כניסה</button>
          <button class="auth-tab" onclick="switchAuthTab('register')">הרשמה</button>
        </div>

        <div id="login-form" class="auth-form">
          <input type="email" id="login-email" placeholder="כתובת אימייל" class="auth-input" autocomplete="email"/>
          <input type="password" id="login-password" placeholder="סיסמה" class="auth-input" autocomplete="current-password"/>
          <button onclick="handleLogin()" class="auth-button primary">כניסה</button>
          <button onclick="handleMagicLink()" class="auth-button secondary">✉️ שלח קישור כניסה לאימייל</button>
        </div>

        <div id="register-form" class="auth-form" style="display:none;">
          <input type="text" id="reg-name" placeholder="שם מלא" class="auth-input" autocomplete="name"/>
          <input type="email" id="reg-email" placeholder="כתובת אימייל" class="auth-input" autocomplete="email"/>
          <input type="password" id="reg-password" placeholder="סיסמה (לפחות 6 תווים)" class="auth-input" autocomplete="new-password"/>
          <button onclick="handleRegister()" class="auth-button primary">יצירת חשבון</button>
        </div>

        <div id="auth-message" class="auth-message" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div id="app-screen" class="screen" style="display:none;">

    <!-- Header -->
    <header class="app-header">
      <button class="icon-btn" id="blur-btn" onclick="toggleBlur()" title="הסתר/הצג נתונים">🔓</button>
      <h1 class="header-title">מעקב פיננסי</h1>
      <div class="header-actions">
        <button class="icon-btn" onclick="showSettings()" title="הגדרות">⚙️</button>
        <button class="icon-btn" onclick="handleLogout()" title="יציאה">🚪</button>
      </div>
    </header>

    <!-- Tabs -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="current" onclick="switchTab('current', this)">📊 דוח נוכחי</button>
      <button class="tab-btn" data-tab="history" onclick="switchTab('history', this)">📈 היסטוריה</button>
    </nav>

    <main class="app-main">

      <!-- ── CURRENT TAB ── -->
      <div id="tab-current" class="tab-panel">
        <div id="current-card" class="main-card card"></div>
      </div>

      <!-- ── HISTORY TAB ── -->
      <div id="tab-history" class="tab-panel" style="display:none;">

        <!-- Chart -->
        <div class="chart-card card">
          <h3 class="card-title">מגמת נכסים</h3>
          <div class="chart-wrap">
            <canvas id="main-chart"></canvas>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls-card card">
          <select id="dateSelect" onchange="onDateChange()">
            <option value="" disabled selected>בחר חודש לפירוט</option>
          </select>
          <button onclick="toggleAddForm()" class="add-btn">➕ הוסף חודש</button>
        </div>

        <!-- Add form -->
        <div id="add-form" class="add-form card" style="display:none;">
          <h3>📝 הוספת חודש חדש</h3>
          <div class="form-row">
            <label>📅 תאריך</label>
            <input type="date" id="new-date" class="form-input"/>
          </div>
          <div id="dynamic-fields"></div>
          <div class="form-row">
            <label>🏠 יתרת משכנתא</label>
            <input type="number" id="new-mortgage" placeholder="0" class="form-input"/>
          </div>
          <div class="form-row">
            <label>📝 הערות</label>
            <input type="text" id="new-notes" placeholder="הערה קצרה (אופציונלי)" class="form-input"/>
          </div>
          <button onclick="submitNewRecord()" class="submit-btn">💾 שמור</button>
        </div>

        <!-- Detail card -->
        <div id="history-detail" class="card" style="display:none;"></div>

      </div>
    </main>

  </div>

  <!-- ===== SETTINGS MODAL ===== -->
  <div id="settings-modal" class="modal-overlay" style="display:none;" onclick="closeSettingsOutside(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h2>⚙️ הגדרות</h2>
        <button onclick="closeSettings()" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <h3>קטגוריות נכסים</h3>
          <p class="settings-hint">אלה הקטגוריות שיופיעו בטופס ובדוח שלך</p>
          <div id="categories-list" class="categories-list"></div>
        </div>
        <div class="settings-section">
          <h3>הוסף קטגוריה חדשה</h3>
          <div class="add-cat-form">
            <input type="text" id="new-cat-key" placeholder="מזהה (אנגלית, ללא רווחים)" class="form-input"/>
            <input type="text" id="new-cat-label" placeholder="שם בעברית" class="form-input"/>
            <input type="text" id="new-cat-icon" placeholder="אמוג'י 💰" class="form-input" maxlength="4"/>
            <button onclick="addCategory()" class="submit-btn">הוסף</button>
          </div>
        </div>
        <div class="settings-section danger-zone">
          <h3>מידע</h3>
          <p class="settings-hint">מחובר בתור: <span id="user-email-display"></span></p>
          <button onclick="handleLogout()" class="logout-btn">🚪 התנתק</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
